<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>Barnsley Bird Checklist</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2d6a4f">
  <style>
    :root {
      --bg: #f8faf8;
      --card: #ffffff;
      --text: #1b2e22;
      --muted: #5c7161;
      --accent: #2d6a4f;
      --accent-light: #d8f3dc;
      --border: #e0eadd;
      --shadow: rgba(0,0,0,0.08);
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
      --radius: 24px;
    }

    [data-theme="dark"] {
      --bg: #0d1a12;
      --card: #16241c;
      --text: #f0f0f0;
      --muted: #b0b8b4;
      --border: #2d6a4f;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--font); line-height: 1.6; }

    /* Header & Progress */
    header {
      background: rgba(255,255,255,0.8); backdrop-filter: blur(10px);
      padding: 16px; position: sticky; top: 0; z-index: 100;
      border-bottom: 1px solid var(--border); text-align: center;
    }

    .header-top { display: flex; justify-content: space-between; align-items: center; max-width: 600px; margin: 0 auto; }
    h1 { margin: 0; font-size: 1.4rem; color: var(--accent); }

    .progress-bar {
      height: 12px; background: var(--accent-light); border-radius: 6px;
      max-width: 600px; margin: 12px auto 4px; overflow: hidden;
    }
    .progress-fill { height: 100%; background: var(--accent); transition: width 0.5s ease; }
    .progress-text { font-size: 0.9rem; font-weight: 700; color: var(--muted); }

    /* Main Actions */
    .top-actions { max-width: 600px; margin: 16px auto; padding: 0 16px; display: flex; flex-direction: column; gap: 12px; }
    .share-btn {
      background: var(--accent); color: white; border: none; padding: 14px;
      border-radius: 16px; font-weight: 700; font-size: 1.1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }

    /* Filters */
    .filters {
      padding: 8px 16px; display: flex; gap: 8px; max-width: 600px; margin: 0 auto;
      position: sticky; top: 110px; background: var(--bg); z-index: 90;
    }
    .search-input { flex: 1; padding: 12px; border-radius: 12px; border: 2px solid var(--border); font-size: 1rem; }

    /* Welcome Onboarding */
    .onboarding {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .onboarding-card { background: white; padding: 32px; border-radius: 32px; text-align: center; max-width: 400px; }
    .onboarding-card h2 { color: var(--accent); margin-top: 0; }
    .onboarding-card button { background: var(--accent); color: white; border: none; padding: 16px 32px; border-radius: 16px; font-weight: 700; cursor: pointer; }

    /* Bird Cards */
    main { padding: 16px; max-width: 1200px; margin: 0 auto; }
    .birds-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }

    .bird-card {
      background: var(--card); border-radius: var(--radius); overflow: hidden;
      box-shadow: 0 8px 24px var(--shadow); border: 2px solid transparent;
      display: flex; flex-direction: column; transition: transform 0.2s;
    }
    .bird-card.seen { border-color: var(--accent); }

    .img-wrap { position: relative; height: 250px; background: #eee; }
    .bird-img { width: 100%; height: 100%; object-fit: cover; }
    .img-loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: #eee; color: var(--muted); }

    .card-body { padding: 20px; flex: 1; display: flex; flex-direction: column; text-align: center; }
    .bird-name { font-size: 1.6rem; margin: 0 0 8px; color: var(--text); }
    .bird-tip { font-style: italic; color: var(--muted); margin-bottom: 20px; font-size: 1rem; }

    .spotted-btn {
      margin-top: auto; padding: 16px; border-radius: 16px; border: 2px solid var(--accent-light);
      background: var(--accent-light); color: var(--accent); font-weight: 800;
      font-size: 1.2rem; cursor: pointer; transition: all 0.2s;
    }
    .spotted-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

    /* Confetti */
    .confetti { position: fixed; top: -10px; width: 10px; height: 10px; border-radius: 50%; z-index: 2000; pointer-events: none; animation: fall 3s linear forwards; }
    @keyframes fall { to { transform: translateY(100vh) rotate(360deg); opacity: 0; } }

    /* Modal */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: flex-end; justify-content: center; z-index: 1000; }
    .modal-content { background: var(--card); width: 100%; max-width: 500px; padding: 24px; border-radius: 32px 32px 0 0; }
    .modal-btn { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 16px; border: 1px solid var(--border); background: var(--card); font-weight: 600; cursor: pointer; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="onboarding" class="onboarding hidden">
    <div class="onboarding-card">
      <h2>Welcome, Mum! 🐦</h2>
      <p>1. Look at the photos to find your bird.<br>2. Tap the big button when you spot one.<br>3. Share your progress with the family!</p>
      <button onclick="closeOnboarding()">Let's Go!</button>
    </div>
  </div>

  <header>
    <div class="header-top">
      <h1>Barnsley Birds</h1>
      <button onclick="toggleModal(true)" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">⚙️</button>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-text" id="progressText">0 of 0 Birds Spotted</div>
  </header>

  <div class="top-actions">
    <button class="share-btn" onclick="shareProgress()">📤 Share My Progress</button>
  </div>

  <div class="filters">
    <input type="text" id="searchInput" class="search-input" placeholder="🔍 Search for a bird..." oninput="render()">
  </div>

  <main>
    <div id="birdGrid" class="birds-grid"></div>
  </main>

  <div id="settingsModal" class="modal" onclick="if(event.target==this) toggleModal(false)">
    <div class="modal-content">
      <h2 style="margin-top:0">Settings</h2>
      <button class="modal-btn" onclick="toggleTheme()">🌓 Light / Dark Mode</button>
      <button class="modal-btn" onclick="exportData()">📤 Backup My Data</button>
      <button class="modal-btn" style="color:red" onclick="resetAll()">🗑️ Start Over (Reset)</button>
      <button class="modal-btn" onclick="toggleModal(false)">Close</button>
    </div>
  </div>

  <script>
    const birds = [
      { id: 'robin', name: 'Robin', rarity: 'Common', tip: 'Red breast, friendly, often visits bird tables.', img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/f/f9/Erithacus_rubecula_%28Marek_Szczepanek%29.jpg/640px-Erithacus_rubecula_%28Marek_Szczepanek%29.jpg' },
      { id: 'blackbird', name: 'Blackbird', rarity: 'Common', tip: 'Males are black with yellow beaks; females are brown.', img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/9f/Turdus_merula_-Great_Snoring%2C_Norfolk%2C_England-8.jpg/640px-Turdus_merula_-Great_Snoring%2C_Norfolk%2C_England-8.jpg' },
      { id: 'bluetit', name: 'Blue Tit', rarity: 'Common', tip: 'Tiny blue cap, yellow breast, very active.', img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/8/86/Eurasian_blue_tit_Lancashire.jpg/640px-Eurasian_blue_tit_Lancashire.jpg' },
      { id: 'greattit', name: 'Great Tit', rarity: 'Common', tip: 'Black head with white cheeks and a black stripe down the breast.', img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4d/Parus_major_-Great_Snoring%2C_Norfolk%2C_England-8.jpg/640px-Parus_major_-Great_Snoring%2C_Norfolk%2C_England-8.jpg' },
      { id: 'woodpigeon', name: 'Woodpigeon', rarity: 'Common', tip: 'Large grey pigeon with a white patch on its neck.', img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/14/Columba_palumbus_-garden_post-8a.jpg/640px-Columba_palumbus_-garden_post-8a.jpg' },
      { id: 'goldfinch', name: 'Goldfinch', rarity: 'Common', tip: 'Bright red face and yellow patches on the wings.', img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/06/Carduelis_carduelis_close_up.jpg/640px-Carduelis_carduelis_close_up.jpg' },
      { id: 'magpie', name: 'Magpie', rarity: 'Common', tip: 'Long tail, black and white with blue-green feathers.', img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/45/Pica_pica_-_Compans_Caffarelli_-_2012-03-16.jpg/640px-Pica_pica_-_Compans_Caffarelli_-_2012-03-16.jpg' },
      { id: 'starling', name: 'Starling', rarity: 'Common', tip: 'Glossy dark feathers with white spots in winter.', img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/0e/Sturnus_vulgaris_2_%28Marek_Szczepanek%29.jpg/640px-Sturnus_vulgaris_2_%28Marek_Szczepanek%29.jpg' },
      { id: 'chaffinch', name: 'Chaffinch', rarity: 'Common', tip: 'Male has a pink breast and blue-grey cap.', img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/5/59/Fringilla_coelebs_chaffinch_male_edit2.jpg/640px-Fringilla_coelebs_chaffinch_male_edit2.jpg' },
      { id: 'wren', name: 'Wren', rarity: 'Common', tip: 'Tiny brown bird with a cocked-up tail and loud song.', img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/43/Troglodytes_troglodytes_001.jpg/640px-Troglodytes_troglodytes_001.jpg' },
      { id: 'housesparrow', name: 'House Sparrow', rarity: 'Common', tip: 'Small brown and grey bird, loves being near houses.', img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/6d/House_Sparrow%2C_England.jpg/640px-House_Sparrow%2C_England.jpg' },
      { id: 'dunnock', name: 'Dunnock', rarity: 'Common', tip: 'Shy, hops near hedges, thin beak.', img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Prunella_modularis_-Gran_Canaria%2C_Spain-8.jpg/640px-Prunella_modularis_-Gran_Canaria%2C_Spain-8.jpg' },
      { id: 'jackdaw', name: 'Jackdaw', rarity: 'Common', tip: 'Small grey-headed crow with bright eyes.', img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Corvus_monedula_-Hartwell_Nature_Reserve%2C_Buckinghamshire%2C_England-8.jpg/640px-Corvus_monedula_-Hartwell_Nature_Reserve%2C_Buckinghamshire%2C_England-8.jpg' },
      { id: 'greylaggoose', name: 'Greylag Goose', rarity: 'Common', tip: 'Big grey goose with a bright orange beak.', img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a8/Greylag_Goose_-_St_James%27s_Park%2C_London_-_Nov_2006.jpg/640px-Greylag_Goose_-_St_James%27s_Park%2C_London_-_Nov_2006.jpg' },
      { id: 'mallard', name: 'Mallard', rarity: 'Common', tip: 'Male has a glossy green head and yellow beak.', img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Mallard2.jpg/640px-Mallard2.jpg' },
      { id: 'nuthatch', name: 'Nuthatch', rarity: 'Uncommon', tip: 'Blue-grey bird that can walk down tree trunks head-first.', img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/9/9d/Sitta_europaea_-Estonia-8a.jpg/640px-Sitta_europaea_-Estonia-8a.jpg' },
      { id: 'kingfisher', name: 'Kingfisher', rarity: 'Rare', tip: 'A flash of bright blue and orange near water.', img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/c/cc/Alcedo_atthis_4_%28Lukasz_Lukasik%29.jpg/640px-Alcedo_atthis_4_%28Lukasz_Lukasik%29.jpg' },
      { id: 'barnowl', name: 'Barn Owl', rarity: 'Rare', tip: 'White heart-shaped face, silent ghost of the night.', img: 'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c2/Tyto_alba_standing_on_the_ground.jpg/640px-Tyto_alba_standing_on_the_ground.jpg' }
    ];

    let userData = {};
    const STORAGE_KEY = 'barnsley_birds_v2';

    function init() {
      loadData();
      if (!localStorage.getItem('onboarded')) {
        document.getElementById('onboarding').classList.remove('hidden');
      }
      render();
      if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
    }

    function loadData() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) userData = JSON.parse(raw);
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(userData));
    }

    function closeOnboarding() {
      localStorage.setItem('onboarded', 'true');
      document.getElementById('onboarding').classList.add('hidden');
    }

    function render() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const grid = document.getElementById('birdGrid');
      
      const filtered = birds.filter(b => b.name.toLowerCase().includes(q));
      
      grid.innerHTML = filtered.map(b => {
        const seen = userData[b.id]?.seen;
        return `
          <article class="bird-card ${seen ? 'seen' : ''}">
            <div class="img-wrap">
              <div class="img-loading">Loading...</div>
              <img src="${b.img}" class="bird-img" alt="${b.name}" onload="this.previousElementSibling.style.display='none'">
            </div>
            <div class="card-body">
              <h2 class="bird-name">${b.name}</h2>
              <p class="bird-tip">${b.tip}</p>
              <button class="spotted-btn ${seen ? 'active' : ''}" onclick="toggleSeen('${b.id}')">
                ${seen ? '✅ Spotted!' : '⬜ Not Seen Yet'}
              </button>
            </div>
          </article>
        `;
      }).join('');
      
      updateProgress();
    }

    function toggleSeen(id) {
      if (!userData[id]) userData[id] = { seen: false };
      userData[id].seen = !userData[id].seen;
      
      if (userData[id].seen) {
        if (navigator.vibrate) navigator.vibrate(50);
        celebrate();
      }
      
      saveData();
      render();
    }

    function updateProgress() {
      const total = birds.length;
      let seen = 0;
      birds.forEach(b => { if (userData[b.id]?.seen) seen++; });
      
      const pct = (seen / total) * 100;
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressText').textContent = `${seen} of ${total} Birds Spotted (${Math.round(pct)}%)`;
    }

    function celebrate() {
      const colors = ['#2d6a4f', '#52b788', '#d8f3dc', '#f39c12'];
      for (let i = 0; i < 40; i++) {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        c.style.width = (Math.random() * 8 + 6) + 'px';
        c.style.height = c.style.width;
        c.style.animationDelay = (Math.random() * 1) + 's';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 3000);
      }
    }

    async function shareProgress() {
      let seen = 0;
      birds.forEach(b => { if (userData[b.id]?.seen) seen++; });
      const message = `I've spotted ${seen} birds on my Barnsley Bird Checklist! 🐦🌳`;
      if (navigator.share) {
        await navigator.share({ title: 'My Birdwatching', text: message, url: window.location.href });
      } else {
        navigator.clipboard.writeText(message);
        alert('Copied to clipboard!');
      }
    }

    function toggleModal(show) { document.getElementById('settingsModal').style.display = show ? 'flex' : 'none'; }
    function toggleTheme() { document.body.dataset.theme = document.body.dataset.theme === 'dark' ? 'light' : 'dark'; toggleModal(false); }
    function exportData() {
      const blob = new Blob([JSON.stringify(userData)], { type: 'application/json' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'bird-data.json'; a.click();
    }
    function resetAll() { if (confirm('Start over?')) { userData = {}; saveData(); render(); toggleModal(false); } }

    init();
  </script>
</body>
</html>
