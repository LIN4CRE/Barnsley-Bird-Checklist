<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>Barnsley Bird Checklist</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2d6a4f">
  <style>
    :root {
      --bg: #f4f7f4;
      --card: #ffffff;
      --text: #1b2e22;
      --muted: #5c7161;
      --accent: #2d6a4f;
      --accent-light: #d8f3dc;
      --border: #e0eadd;
      --shadow: rgba(0,0,0,0.08);
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
      --radius: 24px;
    }

    [data-theme="dark"] {
      --bg: #0d1a12;
      --card: #16241c;
      --text: #f0f0f0;
      --muted: #b0b8b4;
      --border: #2d6a4f;
      --shadow: rgba(0,0,0,0.3);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { 
      margin: 0; 
      background: var(--bg); 
      color: var(--text); 
      font-family: var(--font); 
      line-height: 1.5; 
      transition: background 0.3s;
    }

    /* Header & Progress */
    header {
      background: var(--card);
      padding: 16px; 
      position: sticky; 
      top: 0; 
      z-index: 100;
      border-bottom: 1px solid var(--border); 
      text-align: center;
      box-shadow: 0 2px 10px var(--shadow);
    }

    .header-top { display: flex; justify-content: space-between; align-items: center; max-width: 600px; margin: 0 auto; }
    h1 { margin: 0; font-size: 1.4rem; color: var(--accent); display: flex; align-items: center; gap: 8px; }

    .progress-bar {
      height: 14px; background: var(--accent-light); border-radius: 100px;
      max-width: 500px; margin: 12px auto 4px; overflow: hidden;
    }
    .progress-fill { height: 100%; background: var(--accent); transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
    .progress-text { font-size: 0.9rem; font-weight: 700; color: var(--muted); }

    /* Filters */
    .filters {
      padding: 12px 16px; background: var(--bg); 
      position: sticky; top: 100px; z-index: 90;
      border-bottom: 1px solid var(--border);
    }
    .search-input { 
      width: 100%; max-width: 500px; display: block; margin: 0 auto;
      padding: 14px 20px; border-radius: 16px; border: 2px solid var(--border); 
      font-size: 1.1rem; font-family: inherit;
    }

    /* Action Bar */
    .actions { padding: 16px; display: flex; justify-content: center; gap: 12px; }
    .btn-share {
      background: var(--accent); color: white; border: none; padding: 14px 24px;
      border-radius: 16px; font-weight: 700; font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 12px rgba(45,106,79,0.2);
    }

    /* Grid */
    main { padding: 16px; max-width: 1200px; margin: 0 auto; }
    .birds-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }

    /* Card Design */
    .bird-card {
      background: var(--card); border-radius: var(--radius); overflow: hidden;
      box-shadow: 0 8px 24px var(--shadow); border: 2px solid transparent;
      display: flex; flex-direction: column; transition: transform 0.2s, border-color 0.2s;
    }
    .bird-card.seen { border-color: var(--accent); }

    .img-wrap { 
      position: relative; height: 260px; background: #eee; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .bird-img { width: 100%; height: 100%; object-fit: cover; }
    .img-error { padding: 20px; text-align: center; color: var(--muted); font-weight: 600; }

    .card-body { padding: 20px; flex: 1; display: flex; flex-direction: column; text-align: center; }
    .bird-name { font-size: 1.5rem; margin: 0 0 4px; color: var(--text); }
    .bird-tip { font-size: 0.95rem; color: var(--muted); margin-bottom: 20px; min-height: 3rem; }

    .spotted-btn {
      margin-top: auto; padding: 18px; border-radius: 18px; border: 2px solid var(--accent-light);
      background: var(--accent-light); color: var(--accent); font-weight: 800;
      font-size: 1.2rem; cursor: pointer; transition: all 0.2s;
    }
    .spotted-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

    .wiki-link { margin-top: 12px; font-size: 0.85rem; color: var(--muted); text-decoration: none; font-weight: 600; }

    /* Modal */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: flex-end; justify-content: center; z-index: 1000; padding: 10px; }
    .modal-content { background: var(--card); width: 100%; max-width: 500px; padding: 24px; border-radius: 32px; margin-bottom: env(safe-area-inset-bottom, 20px); }
    .modal-btn { width: 100%; padding: 18px; margin-bottom: 12px; border-radius: 18px; border: 1px solid var(--border); background: var(--card); font-weight: 700; cursor: pointer; font-size: 1rem; }

    /* Confetti */
    .confetti { position: fixed; top: -10px; width: 12px; height: 12px; border-radius: 2px; z-index: 2000; pointer-events: none; animation: fall 3s linear forwards; }
    @keyframes fall { to { transform: translateY(100vh) rotate(360deg); opacity: 0; } }

    .hidden { display: none !important; }
  </style>
</head>
<body onload="init()">
  <header>
    <div class="header-top">
      <h1>🐦 Barnsley Birds</h1>
      <button onclick="toggleModal(true)" style="background:none; border:none; font-size:1.6rem; cursor:pointer;">⚙️</button>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-text" id="progressText">Checking your sightings...</div>
  </header>

  <div class="actions">
    <button class="btn-share" onclick="shareProgress()">📤 Share My Progress</button>
  </div>

  <div class="filters">
    <input type="text" id="searchInput" class="search-input" placeholder="🔍 Search by name..." oninput="render()">
  </div>

  <main>
    <div id="birdGrid" class="birds-grid"></div>
  </main>

  <div id="settingsModal" class="modal" onclick="if(event.target==this) toggleModal(false)">
    <div class="modal-content">
      <h2 style="margin-top:0; color:var(--accent)">Settings</h2>
      <button class="modal-btn" onclick="toggleTheme()">🌓 Change Light/Dark Mode</button>
      <button class="modal-btn" onclick="exportData()">📤 Save a Backup</button>
      <button class="modal-btn" style="color:var(--danger); border-color:rgba(255,0,0,0.2)" onclick="resetAll()">🗑️ Reset Everything</button>
      <button class="modal-btn" onclick="toggleModal(false)" style="background:var(--accent-light)">Close</button>
    </div>
  </div>

  <script>
    // Using a high-performance image proxy (weserv.nl) to ensure images load fast and reliably
    function getSafeImg(url) {
      return `https://wsrv.nl/?url=${encodeURIComponent(url)}&w=600&h=600&fit=cover&q=80`;
    }

    const birds = [
      { id: 'robin', name: 'European Robin', tip: 'Red breast, friendly, often visits bird tables.', img: 'https://upload.wikimedia.org/wikipedia/commons/f/f9/Erithacus_rubecula_%28Marek_Szczepanek%29.jpg' },
      { id: 'blackbird', name: 'Common Blackbird', tip: 'Males are black with yellow beaks; females are brown.', img: 'https://upload.wikimedia.org/wikipedia/commons/9/9f/Turdus_merula_-Great_Snoring%2C_Norfolk%2C_England-8.jpg' },
      { id: 'woodpecker', name: 'Great Spotted Woodpecker', tip: 'Black and white with a red patch on the head. Loves drumming!', img: 'https://upload.wikimedia.org/wikipedia/commons/0/0e/Dendrocopos_major_-01.jpg' },
      { id: 'green_woodpecker', name: 'European Green Woodpecker', tip: 'Large green bird with a red cap. Often on lawns eating ants.', img: 'https://upload.wikimedia.org/wikipedia/commons/6/6e/Picus_viridis_-01.jpg' },
      { id: 'bluetit', name: 'Eurasian Blue Tit', tip: 'Tiny blue cap, yellow breast, very active on feeders.', img: 'https://upload.wikimedia.org/wikipedia/commons/8/86/Eurasian_blue_tit_Lancashire.jpg' },
      { id: 'greattit', name: 'Great Tit', tip: 'Black head with white cheeks and a black stripe down the breast.', img: 'https://upload.wikimedia.org/wikipedia/commons/4/4d/Parus_major_-Great_Snoring%2C_Norfolk%2C_England-8.jpg' },
      { id: 'woodpigeon', name: 'Common Woodpigeon', tip: 'Large grey pigeon with a white patch on its neck.', img: 'https://upload.wikimedia.org/wikipedia/commons/1/14/Columba_palumbus_-garden_post-8a.jpg' },
      { id: 'goldfinch', name: 'European Goldfinch', tip: 'Bright red face and yellow patches on the wings.', img: 'https://upload.wikimedia.org/wikipedia/commons/0/06/Carduelis_carduelis_close_up.jpg' },
      { id: 'bullfinch', name: 'Eurasian Bullfinch', tip: 'Male has a bright pinkish-red breast and a black cap.', img: 'https://upload.wikimedia.org/wikipedia/commons/6/65/Pyrrhula_pyrrhula_-_01.jpg' },
      { id: 'magpie', name: 'Eurasian Magpie', tip: 'Long tail, black and white with blue-green feathers.', img: 'https://upload.wikimedia.org/wikipedia/commons/4/45/Pica_pica_-_Compans_Caffarelli_-_2012-03-16.jpg' },
      { id: 'starling', name: 'Common Starling', tip: 'Glossy dark feathers with white spots in winter.', img: 'https://upload.wikimedia.org/wikipedia/commons/0/0e/Sturnus_vulgaris_2_%28Marek_Szczepanek%29.jpg' },
      { id: 'jay', name: 'Eurasian Jay', tip: 'Pinkish-brown crow with a bright blue patch on the wing.', img: 'https://upload.wikimedia.org/wikipedia/commons/f/f9/Garrulus_glandarius_1_%28Marek_Szczepanek%29.jpg' },
      { id: 'sparrowhawk', name: 'Eurasian Sparrowhawk', tip: 'Small hawk, often visits gardens to hunt small birds.', img: 'https://upload.wikimedia.org/wikipedia/commons/9/9b/Accipiter_nisus_-01.jpg' },
      { id: 'wren', name: 'Eurasian Wren', tip: 'Tiny brown bird with a cocked-up tail and loud song.', img: 'https://upload.wikimedia.org/wikipedia/commons/4/43/Troglodytes_troglodytes_001.jpg' },
      { id: 'housesparrow', name: 'House Sparrow', tip: 'Small brown and grey bird, loves being near houses.', img: 'https://upload.wikimedia.org/wikipedia/commons/6/6d/House_Sparrow%2C_England.jpg' },
      { id: 'kestrel', name: 'Common Kestrel', tip: 'Small hawk often seen hovering over fields or roads.', img: 'https://upload.wikimedia.org/wikipedia/commons/0/0c/Falco_tinnunculus_-_01.jpg' },
      { id: 'buzzard', name: 'Common Buzzard', tip: 'Large hawk with broad wings, often seen soaring.', img: 'https://upload.wikimedia.org/wikipedia/commons/6/6e/Buteo_buteo_-01.jpg' },
      { id: 'kingfisher', name: 'Common Kingfisher', tip: 'A flash of bright blue and orange near water.', img: 'https://upload.wikimedia.org/wikipedia/commons/c/cc/Alcedo_atthis_4_%28Lukasz_Lukasik%29.jpg' },
      { id: 'barnowl', name: 'Barn Owl', tip: 'White heart-shaped face, silent ghost of the night.', img: 'https://upload.wikimedia.org/wikipedia/commons/c/c2/Tyto_alba_standing_on_the_ground.jpg' }
    ];

    let userData = {};
    const STORAGE_KEY = 'barnsley_birds_v3';

    function init() {
      loadData();
      render();
      if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
    }

    function loadData() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) userData = JSON.parse(raw);
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(userData));
    }

    function render() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const grid = document.getElementById('birdGrid');
      
      const filtered = birds.filter(b => b.name.toLowerCase().includes(q));
      
      grid.innerHTML = filtered.map(b => {
        const seen = userData[b.id]?.seen;
        const wikiUrl = `https://en.wikipedia.org/wiki/${b.name.replace(/ /g, '_')}`;
        return `
          <article class="bird-card ${seen ? 'seen' : ''}">
            <div class="img-wrap" onclick="window.open('${wikiUrl}', '_blank')">
              <img src="${getSafeImg(b.img)}" class="bird-img" alt="${b.name}" 
                onerror="this.parentElement.innerHTML='<div class="img-error">🐦 Click to see photo on Wikipedia</div>'">
            </div>
            <div class="card-body">
              <h2 class="bird-name">${b.name}</h2>
              <p class="bird-tip">${b.tip}</p>
              <button class="spotted-btn ${seen ? 'active' : ''}" onclick="event.stopPropagation(); toggleSeen('${b.id}')">
                ${seen ? '✅ Spotted!' : '⬜ Not Seen Yet'}
              </button>
              <a href="${wikiUrl}" target="_blank" class="wiki-link">More photos on Wikipedia ↗</a>
            </div>
          </article>
        `;
      }).join('');
      
      updateProgress();
    }

    function toggleSeen(id) {
      if (!userData[id]) userData[id] = { seen: false };
      userData[id].seen = !userData[id].seen;
      if (userData[id].seen) {
        if (navigator.vibrate) navigator.vibrate(60);
        celebrate();
      }
      saveData();
      render();
    }

    function updateProgress() {
      const total = birds.length;
      let seen = 0;
      birds.forEach(b => { if (userData[b.id]?.seen) seen++; });
      const pct = (seen / total) * 100;
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressText').textContent = `${seen} of ${total} Birds Spotted (${Math.round(pct)}%)`;
    }

    function celebrate() {
      const colors = ['#2d6a4f', '#52b788', '#d8f3dc', '#f39c12'];
      for (let i = 0; i < 40; i++) {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        c.style.width = (Math.random() * 10 + 6) + 'px';
        c.style.height = c.style.width;
        c.style.animationDelay = (Math.random() * 1.5) + 's';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 4000);
      }
    }

    async function shareProgress() {
      let seen = 0;
      birds.forEach(b => { if (userData[b.id]?.seen) seen++; });
      const message = `I've spotted ${seen} birds on my Barnsley Bird Checklist! 🐦🌳`;
      if (navigator.share) {
        try { await navigator.share({ title: 'My Birdwatching', text: message, url: window.location.href }); } catch(e){}
      } else {
        navigator.clipboard.writeText(message);
        alert('Progress copied to clipboard!');
      }
    }

    function toggleModal(show) { document.getElementById('settingsModal').style.display = show ? 'flex' : 'none'; }
    function toggleTheme() { document.body.dataset.theme = document.body.dataset.theme === 'dark' ? 'light' : 'dark'; toggleModal(false); }
    function exportData() {
      const blob = new Blob([JSON.stringify(userData)], { type: 'application/json' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'bird-backup.json'; a.click();
    }
    function resetAll() { if (confirm('Mark all birds as NOT SEEN?')) { userData = {}; saveData(); render(); toggleModal(false); } }
  </script>
</body>
</html>
